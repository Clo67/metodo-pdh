<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método PDH - Encuentra tu Punto de Equilibrio</title>
    
    <!-- Motores de Renderizado -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Librería de Iconos Lucide para React -->
    <script src="https://unpkg.com/lucide-react@0.372.0/dist/umd/lucide-react.js"></script>

    <style>
        /* Importación de Fuentes Originales */
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap');

        :root {
            --font-syne: 'Syne', sans-serif;
            --font-dmsans: 'DM Sans', sans-serif;
            --color-navy: #0A1628;
            --color-navy-light: #162034;
            --color-lime: #C8F56A;
            --color-cyan: #4DCFCF;
            --color-lavender: #C5B8E8;
            --color-peach: #F0A884;
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-dmsans);
            background-color: var(--color-navy);
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        .font-syne { font-family: var(--font-syne); }

        /* Estilo Mesh Background Original */
        .mesh-bg {
            background-color: var(--color-navy);
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(77, 207, 207, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 85% 40%, rgba(197, 184, 232, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 50% 90%, rgba(200, 245, 106, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .glass-panel-hover:hover {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }

        .reveal-target {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal-target.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState, useRef } = React;
        const { 
            Heart, Sparkles, Target, Layers, ArrowRight, CheckCircle2, 
            Zap, Compass, TrendingUp, RefreshCcw, Star, Loader2 
        } = LucideReact;

        // --- COMPONENTES UI ---
        const Badge = ({ children, colorClass = "text-[#C8F56A] bg-[#C8F56A]/10 border-[#C8F56A]/20" }) => (
            <span className={`inline-flex items-center px-3 py-1 rounded-full text-sm font-medium border ${colorClass} transition-all`}>
                {children}
            </span>
        );

        const SectionHeading = ({ title, subtitle, align = "center" }) => (
            <div className={`mb-16 ${align === "center" ? "text-center" : "text-left"} reveal-target`}>
                <h2 className="font-syne text-4xl md:text-5xl font-bold text-white mb-6 leading-tight">{title}</h2>
                {subtitle && <p className="text-xl text-white/70 max-w-2xl mx-auto font-light leading-relaxed">{subtitle}</p>}
            </div>
        );

        // --- SECCIONES ---
        const HeroSection = () => (
            <section className="relative min-h-screen flex items-center justify-center pt-20 pb-12 overflow-hidden px-6">
                <div className="absolute top-1/4 left-1/4 w-64 h-64 bg-[#4DCFCF]/10 rounded-full blur-[100px] animate-float"></div>
                <div className="absolute bottom-1/4 right-1/4 w-80 h-80 bg-[#C5B8E8]/10 rounded-full blur-[100px] animate-float" style={{animationDelay:'2s'}}></div>
                <div className="relative z-10 max-w-5xl mx-auto text-center reveal-target">
                    <Badge>Experiencia de Transformación</Badge>
                    <h1 className="font-syne text-6xl md:text-8xl font-bold text-white mt-8 mb-8 leading-[1.1] tracking-tight">
                        Encuentra tu <br className="hidden md:block"/>
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#C8F56A] to-[#4DCFCF]">Punto de Equilibrio</span>
                    </h1>
                    <p className="text-xl md:text-2xl text-white/70 max-w-3xl mx-auto mb-12 font-light leading-relaxed">
                        El Método PDH no es una idea abstracta; es el lugar exacto donde convergen tu identidad profunda, tu talento innato y tu capacidad de acción.
                    </p>
                    <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
                        <button onClick={() => document.getElementById('analizador').scrollIntoView({behavior:'smooth'})} 
                                className="px-8 py-4 rounded-[24px] bg-[#C8F56A] text-[#0A1628] font-bold text-lg hover:scale-105 transition-all shadow-[0_0_40px_rgba(200,245,106,0.3)] flex items-center gap-3 w-full sm:w-auto justify-center">
                            Descubrir mi propósito <ArrowRight size={20} />
                        </button>
                    </div>
                </div>
            </section>
        );

        const TriangleSection = () => {
            const pillars = [
                { id: "P", title: "Pasión", sub: "Los Sueños", desc: "El motor emocional y la dirección hacia la cual tiende la voluntad. Se alimenta de tus sueños e intereses profundos.", icon: <Heart size={32} className="text-[#C5B8E8]" />, color: "border-[#C5B8E8]/30" },
                { id: "D", title: "Dones", sub: "El Desarrollo Personal", desc: "La esencia y potencial innato. Tus virtudes propias (intuición, creatividad) y crecimiento interno.", icon: <Star size={32} className="text-[#4DCFCF]" />, color: "border-[#4DCFCF]/30" },
                { id: "H", title: "Habilidades", sub: "Expertise y Experiencia", desc: "El componente práctico y técnico. La herramienta pulida que permite entregar resultados tangibles.", icon: <Layers size={32} className="text-[#F0A884]" />, color: "border-[#F0A884]/30" }
            ];
            return (
                <section id="metodo" className="py-24 px-6 relative max-w-7xl mx-auto">
                    <SectionHeading title="El Triángulo del Propósito" subtitle="Tres ejes fundamentales que deben alinearse para encontrar el éxito y la plenitud." />
                    <div className="grid md:grid-cols-3 gap-8 mt-16">
                        {pillars.map((p, i) => (
                            <div key={p.id} className="glass-panel glass-panel-hover rounded-[32px] p-8 reveal-target flex flex-col items-start" style={{transitionDelay: `${(i+1)*100}ms`}}>
                                <div className={`w-16 h-16 rounded-[20px] flex items-center justify-center glass-panel border mb-8 ${p.color}`}>{p.icon}</div>
                                <h3 className="font-syne text-5xl font-bold text-white/20 mb-2">{p.id}</h3>
                                <h4 className="text-2xl font-bold text-white mb-1">{p.title}</h4>
                                <span className="text-sm uppercase tracking-wider text-white/50 mb-6 block">{p.sub}</span>
                                <p className="text-white/70 leading-relaxed text-sm md:text-base">{p.desc}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const SynergySection = () => {
            const combinations = [
                { title: "Pasión + Dones", result: "Idealismo sin Impacto", desc: "Genera autenticidad y gozo, pero sin las habilidades técnicas, se queda en intenciones.", missing: "Falta: Habilidad" },
                { title: "Dones + Habilidades", result: "Eficiencia Vacía", desc: "Produce éxito profesional, pero sin pasión, conduce al agotamiento existencial.", missing: "Falta: Pasión" },
                { title: "Pasión + Habilidades", result: "Desgaste Constante", desc: "Alto desempeño pero forzando tu naturaleza al no usar tus dones innatos.", missing: "Falta: Dones" }
            ];
            return (
                <section className="py-24 px-6 max-w-7xl mx-auto">
                    <SectionHeading title="La Interacción y el Desequilibrio" align="left" />
                    <div className="grid md:grid-cols-3 gap-6">
                        {combinations.map((c, i) => (
                            <div key={i} className="glass-panel rounded-[24px] p-8 reveal-target" style={{transitionDelay: `${(i+1)*100}ms`}}>
                                <div className="flex items-center gap-3 mb-4"><Compass size={20} className="text-[#4DCFCF]" /><span className="font-syne font-semibold text-white/80">{c.title}</span></div>
                                <h4 className="text-2xl font-bold text-[#F0A884] mb-4">{c.result}</h4>
                                <p className="text-white/70 text-sm mb-8">{c.desc}</p>
                                <div className="inline-flex px-4 py-2 rounded-full glass-panel text-white/50 text-sm">{c.missing}</div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const InteractiveToolSection = () => {
            const [inputs, setInputs] = useState({ p: '', d: '', h: '' });
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const isComplete = inputs.p && inputs.d && inputs.h;

            const analyze = () => {
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    setResult(`Tu propósito óptimo se halla al fusionar tu pasión por "${inputs.p}" con tus dones en "${inputs.d}". Usando tus habilidades en "${inputs.h}", crearás un impacto real.`);
                }, 1800);
            };

            return (
                <section id="analizador" className="py-24 px-6 bg-[#0A1628]/80">
                    <div className="max-w-4xl mx-auto glass-panel rounded-[32px] p-8 md:p-12 reveal-target">
                        <SectionHeading title="Analiza tu Propósito" />
                        <div className="space-y-6">
                            <div><label className="text-white/80 block mb-2 font-syne">Pasión</label><textarea onChange={e=>setInputs({...inputs, p:e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-[#C8F56A]/50 outline-none h-24 transition-all" /></div>
                            <div><label className="text-white/80 block mb-2 font-syne">Dones</label><textarea onChange={e=>setInputs({...inputs, d:e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-[#C8F56A]/50 outline-none h-24 transition-all" /></div>
                            <div><label className="text-white/80 block mb-2 font-syne">Habilidades</label><textarea onChange={e=>setInputs({...inputs, h:e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-[#C8F56A]/50 outline-none h-24 transition-all" /></div>
                            <button onClick={analyze} disabled={!isComplete || loading} className={`w-full py-5 rounded-2xl font-bold text-lg transition-all ${isComplete ? 'bg-[#C8F56A] text-navy hover:scale-[1.02] text-[#0A1628]' : 'bg-white/10 text-white/30'}`}>
                                {loading ? 'Analizando...' : 'Revelar mi Propósito'}
                            </button>
                            {result && <div className="mt-8 p-8 rounded-2xl border border-[#C8F56A]/30 bg-[#C8F56A]/10 animate-fade-in text-lg italic">{result}</div>}
                        </div>
                    </div>
                </section>
            );
        };

        function App() {
            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal-target').forEach(el => observer.observe(el));
            }, []);

            return (
                <div className="mesh-bg min-h-screen">
                    <nav className="fixed top-0 w-full z-50 glass-panel px-6 py-4 border-x-0 border-t-0">
                        <div className="max-w-7xl mx-auto flex justify-between items-center font-syne font-bold text-2xl text-[#C8F56A]">PDH.</div>
                    </nav>
                    <HeroSection />
                    <TriangleSection />
                    <SynergySection />
                    <InteractiveToolSection />
                    <footer className="py-20 text-center text-white/40 text-sm">© 2026 Método PDH Interactivos</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
