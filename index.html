<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método PDH - Encuentra tu Punto de Equilibrio</title>
    
    <!-- Scripts de Motor -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Iconos Lucide (Versión estable para navegador) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap');
        
        :root {
            --font-syne: 'Syne', sans-serif;
            --font-dmsans: 'DM Sans', sans-serif;
            --color-navy: #0A1628;
            --color-lime: #C8F56A;
        }

        body {
            font-family: var(--font-dmsans);
            background-color: var(--color-navy);
            color: white;
            margin: 0;
        }

        .font-syne { font-family: var(--font-syne); }

        .mesh-bg {
            background-color: var(--color-navy);
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(77, 207, 207, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 85% 40%, rgba(197, 184, 232, 0.12) 0%, transparent 35%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .reveal-target {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .reveal-target.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Icono Simple para evitar errores de carga
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Badge = ({ children }) => (
            <span className="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium border border-[#C8F56A]/20 text-[#C8F56A] bg-[#C8F56A]/10">
                {children}
            </span>
        );

        const App = () => {
            const [inputs, setInputs] = useState({ p: '', d: '', h: '' });
            const [result, setResult] = useState(null);

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('active');
                    });
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal-target').forEach(el => observer.observe(el));
            }, []);

            return (
                <div className="min-h-screen mesh-bg">
                    {/* NAV */}
                    <nav className="fixed top-0 w-full z-50 glass-panel px-6 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="font-syne font-bold text-2xl text-[#C8F56A]">PDH.</div>
                            <div className="hidden md:flex gap-8 text-sm">
                                <a href="#metodo" className="hover:text-[#C8F56A]">El Método</a>
                                <a href="#analizador" className="hover:text-[#C8F56A]">Analizador</a>
                            </div>
                        </div>
                    </nav>

                    {/* HERO */}
                    <section className="pt-40 pb-20 px-6 text-center reveal-target">
                        <Badge>Experiencia de Transformación</Badge>
                        <h1 className="font-syne text-5xl md:text-7xl font-bold mt-8 mb-6">
                            Encuentra tu <br/>
                            <span className="text-[#C8F56A]">Punto de Equilibrio</span>
                        </h1>
                        <p className="text-xl text-white/70 max-w-2xl mx-auto mb-10">
                            Donde convergen tu pasión, tus dones y tus habilidades.
                        </p>
                        <button onClick={() => document.getElementById('analizador').scrollIntoView({behavior:'smooth'})}
                                className="bg-[#C8F56A] text-[#0A1628] px-8 py-4 rounded-full font-bold hover:scale-105 transition-transform">
                            Comenzar ahora
                        </button>
                    </section>

                    {/* METODO */}
                    <section id="metodo" className="py-20 px-6 max-w-7xl mx-auto">
                        <div className="grid md:grid-cols-3 gap-8">
                            <div className="glass-panel p-8 rounded-3xl reveal-target">
                                <Icon name="heart" className="text-purple-400 mb-4" />
                                <h3 className="text-2xl font-bold mb-2">Pasión</h3>
                                <p className="text-white/60">Lo que amas hacer y te da energía natural.</p>
                            </div>
                            <div className="glass-panel p-8 rounded-3xl reveal-target">
                                <Icon name="star" className="text-cyan-400 mb-4" />
                                <h3 className="text-2xl font-bold mb-2">Dones</h3>
                                <p className="text-white/60">Tus talentos innatos y lo que es rentable.</p>
                            </div>
                            <div className="glass-panel p-8 rounded-3xl reveal-target">
                                <Icon name="layers" className="text-orange-400 mb-4" />
                                <h3 className="text-2xl font-bold mb-2">Habilidades</h3>
                                <p className="text-white/60">Tu experiencia técnica y preparación.</p>
                            </div>
                        </div>
                    </section>

                    {/* ANALIZADOR */}
                    <section id="analizador" className="py-20 px-6">
                        <div className="max-w-3xl mx-auto glass-panel p-8 md:p-12 rounded-[40px] reveal-target">
                            <h2 className="font-syne text-3xl font-bold mb-8 text-center">Analizador de Propósito</h2>
                            <div className="space-y-4">
                                <textarea placeholder="¿Qué te apasiona?" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#C8F56A]/50 h-24" />
                                <textarea placeholder="¿Cuáles son tus dones?" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#C8F56A]/50 h-24" />
                                <textarea placeholder="¿Qué habilidades tienes?" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#C8F56A]/50 h-24" />
                                <button className="w-full bg-[#C8F56A] text-navy font-bold py-4 rounded-2xl text-[#0A1628]">
                                    Descubrir mi centro
                                </button>
                            </div>
                        </div>
                    </section>

                    <footer className="py-20 text-center opacity-40 text-sm">
                        <p>© 2026 Método PDH Interactivos</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
