<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método PDH - Completo</title>
    
    <!-- Librerías Core -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Iconos Lucide (Versión súper compatible) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap');
        :root {
            --font-syne: 'Syne', sans-serif;
            --font-dmsans: 'DM Sans', sans-serif;
            --color-navy: #0A1628;
            --color-lime: #C8F56A;
        }
        body { font-family: var(--font-dmsans); background-color: var(--color-navy); color: white; margin: 0; overflow-x: hidden; }
        .font-syne { font-family: var(--font-syne); }
        .mesh-bg {
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(77, 207, 207, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 85% 40%, rgba(197, 184, 232, 0.1) 0%, transparent 35%);
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Icono a prueba de errores
        const LucideIcon = ({ name, color = "currentColor" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, []);
            return <i data-lucide={name} className="w-6 h-6" style={{color: color}}></i>;
        };

        const App = () => {
            const [step, setStep] = useState(0);
            const [inputs, setInputs] = useState({p:'', d:'', h:''});
            const [res, setRes] = useState(null);

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
                }, {threshold: 0.1});
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }, []);

            const stepsData = [
                { t: "01. Explora", d: "Escribe 5 actividades a las que te dedicarías el resto de tu vida." },
                { t: "02. Dibuja", d: "Analiza cada idea: ¿Pasión? ¿Dones? ¿Habilidades?" },
                { t: "03. Equilibra", d: "Busca donde los tres pilares sean igual de fuertes." },
                { t: "04. Decide", d: "Elige la que más sentido tenga para tu vida actual." },
                { t: "05. Itera", d: "Prueba en la vida real durante 3 meses y ajusta." }
            ];

            return (
                <div className="mesh-bg min-h-screen">
                    <nav className="fixed w-full z-50 glass py-4 px-6 flex justify-between items-center">
                        <div className="text-[#C8F56A] font-syne font-bold text-2xl">PDH.</div>
                        <div className="hidden md:flex gap-6 text-sm opacity-70">
                            <a href="#metodo">Método</a>
                            <a href="#analizador">Analizador</a>
                            <a href="#guia">Guía</a>
                        </div>
                    </nav>

                    {/* HERO */}
                    <section className="pt-32 pb-20 px-6 text-center reveal">
                        <span className="border border-[#C8F56A]/30 text-[#C8F56A] px-4 py-1 rounded-full text-xs mb-6 inline-block">MÉTODO ACTUALIZADO</span>
                        <h1 className="font-syne text-5xl md:text-7xl font-bold mt-6 mb-6">Encuentra tu <br/><span className="text-[#C8F56A]">Punto de Equilibrio</span></h1>
                        <p className="text-white/60 max-w-xl mx-auto text-lg">Donde convergen tu identidad profunda, tu talento y tu capacidad de acción.</p>
                        <button onClick={() => document.getElementById('analizador').scrollIntoView({behavior:'smooth'})} className="mt-10 bg-[#C8F56A] text-black px-8 py-4 rounded-full font-bold hover:scale-105 transition-transform">Comenzar Evaluación</button>
                    </section>

                    {/* TRIANGULO */}
                    <section id="metodo" className="py-20 px-6 max-w-6xl mx-auto">
                        <h2 className="font-syne text-3xl text-center mb-12">El Triángulo del Propósito</h2>
                        <div className="grid md:grid-cols-3 gap-6">
                            <div className="glass p-8 rounded-3xl reveal">
                                <LucideIcon name="heart" color="#C5B8E8" />
                                <h3 className="text-xl font-bold mt-4">Pasión</h3>
                                <p className="text-white/50 mt-2 text-sm">Tu motor emocional. Lo que harías gratis por puro entusiasmo.</p>
                            </div>
                            <div className="glass p-8 rounded-3xl reveal">
                                <LucideIcon name="star" color="#4DCFCF" />
                                <h3 className="text-xl font-bold mt-4">Dones</h3>
                                <p className="text-white/50 mt-2 text-sm">Tu esencia y potencial innato. Tus talentos naturales.</p>
                            </div>
                            <div className="glass p-8 rounded-3xl reveal">
                                <LucideIcon name="layers" color="#F0A884" />
                                <h3 className="text-xl font-bold mt-4">Habilidades</h3>
                                <p className="text-white/50 mt-2 text-sm">Tu experiencia técnica y práctica adquirida con los años.</p>
                            </div>
                        </div>
                    </section>

                    {/* ANALIZADOR */}
                    <section id="analizador" className="py-20 px-6 bg-black/20">
                        <div className="max-w-2xl mx-auto glass p-8 md:p-12 rounded-[40px] reveal">
                            <h2 className="font-syne text-2xl font-bold mb-8 text-center text-[#C8F56A]">Analiza tu Propósito</h2>
                            <div className="space-y-4">
                                <textarea placeholder="¿Qué te apasiona?" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#C8F56A] h-20 transition-all" onChange={e=>setInputs({...inputs, p:e.target.value})} />
                                <textarea placeholder="¿Cuáles son tus dones?" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#C8F56A] h-20 transition-all" onChange={e=>setInputs({...inputs, d:e.target.value})} />
                                <textarea placeholder="¿Qué habilidades tienes?" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#C8F56A] h-20 transition-all" onChange={e=>setInputs({...inputs, h:e.target.value})} />
                                <button onClick={()=>{setRes(`Tu zona de genialidad está en conectar tu pasión por "${inputs.p}" con tus dones en "${inputs.d}".`)}} className="w-full bg-[#C8F56A] text-black font-bold py-4 rounded-2xl">Revelar Mi Centro</button>
                                {res && <div className="mt-6 p-6 border border-[#C8F56A]/30 bg-[#C8F56A]/10 rounded-2xl text-center text-sm italic animate-pulse">{res}</div>}
                            </div>
                        </div>
                    </section>

                    {/* GUIA */}
                    <section id="guia" className="py-20 px-6 max-w-5xl mx-auto">
                        <h2 className="font-syne text-3xl text-center mb-12">Guía Paso a Paso</h2>
                        <div className="flex flex-col md:flex-row gap-8">
                            <div className="md:w-1/3 flex flex-col gap-2">
                                {stepsData.map((s,i)=>(
                                    <button key={i} onClick={()=>setStep(i)} className={`p-4 rounded-xl text-left border ${step===i?'bg-white/10 border-[#C8F56A]':'border-transparent opacity-40'}`}>{s.t}</button>
                                ))}
                            </div>
                            <div className="md:w-2/3 glass p-10 rounded-3xl flex flex-col justify-center min-h-[200px]">
                                <h3 className="text-2xl font-bold mb-4">{stepsData[step].t}</h3>
                                <p className="text-white/60 text-lg">{stepsData[step].d}</p>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 text-center opacity-30 text-xs">© 2026 MÉTODO PDH - INTERACTIVO</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
