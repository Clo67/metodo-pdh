<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método PDH - Encuentra tu Punto de Equilibrio</title>
    
    <!-- Motores: React, Tailwind CSS, Babel y Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>

    <style>
      /* Estilos adicionales para que las fuentes carguen bien */
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap');
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Extraemos los hooks de React y los iconos de Lucide
        const { useEffect, useState, useRef } = React;
        const { 
          Heart, Sparkles, Target, Layers, ArrowRight, CheckCircle2, 
          Zap, Compass, TrendingUp, RefreshCcw, Star, Loader2 
        } = LucideReact;

        // --- ESTILOS GLOBALES ---
        const globalStyles = `
          :root {
            --font-syne: 'Syne', sans-serif;
            --font-dmsans: 'DM Sans', sans-serif;
            --color-navy: #0A1628;
            --color-navy-light: #162034;
            --color-lime: #C8F56A;
            --color-cyan: #4DCFCF;
            --color-lavender: #C5B8E8;
            --color-peach: #F0A884;
          }
          html { scroll-behavior: smooth; }
          body {
            font-family: var(--font-dmsans);
            background-color: var(--color-navy);
            color: white;
            overflow-x: hidden;
          }
          .font-syne { font-family: var(--font-syne); }
          .mesh-bg {
            background-color: var(--color-navy);
            background-image: 
              radial-gradient(circle at 15% 20%, rgba(77, 207, 207, 0.12) 0%, transparent 35%),
              radial-gradient(circle at 85% 40%, rgba(197, 184, 232, 0.12) 0%, transparent 35%),
              radial-gradient(circle at 50% 90%, rgba(200, 245, 106, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
          }
          .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
          }
          .glass-panel-hover:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-4px);
            transition: all 0.3s ease;
          }
          .reveal-target {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
          }
          .reveal-target.active {
            opacity: 1;
            transform: translateY(0);
          }
          @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
          }
          .animate-float { animation: float 6s ease-in-out infinite; }
        `;

        // --- COMPONENTES ---
        const Badge = ({ children, colorClass = "text-[#C8F56A] bg-[#C8F56A]/10 border-[#C8F56A]/20" }) => (
          <span className={`inline-flex items-center px-3 py-1 rounded-full text-sm font-medium border ${colorClass} transition-all`}>
            {children}
          </span>
        );

        const SectionHeading = ({ title, subtitle, align = "center" }) => (
          <div className={`mb-16 ${align === "center" ? "text-center" : "text-left"} reveal-target`}>
            <h2 className="font-syne text-4xl md:text-5xl font-bold text-white mb-6 leading-tight">{title}</h2>
            {subtitle && <p className="text-xl text-white/70 max-w-2xl mx-auto font-light leading-relaxed">{subtitle}</p>}
          </div>
        );

        const HeroSection = () => (
          <section className="relative min-h-screen flex items-center justify-center pt-20 pb-12 overflow-hidden px-6">
            <div className="absolute top-1/4 left-1/4 w-64 h-64 bg-[#4DCFCF]/10 rounded-full blur-[100px] animate-float"></div>
            <div className="relative z-10 max-w-5xl mx-auto text-center reveal-target">
              <Badge>Experiencia de Transformación</Badge>
              <h1 className="font-syne text-6xl md:text-8xl font-bold text-white mt-8 mb-8 leading-[1.1]">
                Encuentra tu <br/>
                <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#C8F56A] to-[#4DCFCF]">Punto de Equilibrio</span>
              </h1>
              <p className="text-xl md:text-2xl text-white/70 max-w-3xl mx-auto mb-12 font-light">
                El Método PDH es el lugar exacto donde convergen tu identidad profunda, tu talento y tu capacidad de acción.
              </p>
              <div className="flex flex-col sm:row items-center justify-center gap-6">
                <button onClick={() => document.getElementById('analizador').scrollIntoView({behavior:'smooth'})} className="px-8 py-4 rounded-[24px] bg-[#C8F56A] text-[#0A1628] font-bold text-lg hover:scale-105 transition-all flex items-center gap-3">
                  Descubrir mi propósito <ArrowRight size={20} />
                </button>
              </div>
            </div>
          </section>
        );

        const TriangleSection = () => {
          const pillars = [
            { id: "P", title: "Pasión", desc: "El motor emocional. Los sueños que te entusiasman.", icon: <Heart size={32} className="text-[#C5B8E8]" /> },
            { id: "D", title: "Dones", desc: "Tu esencia y potencial innato. Quién eres realmente.", icon: <Star size={32} className="text-[#4DCFCF]" /> },
            { id: "H", title: "Habilidades", desc: "Herramientas pulidas y experiencia técnica adquirida.", icon: <Layers size={32} className="text-[#F0A884]" /> }
          ];
          return (
            <section id="metodo" className="py-24 px-6 max-w-7xl mx-auto">
              <SectionHeading title="El Triángulo del Propósito" subtitle="Tres ejes que deben alinearse para encontrar la plenitud." />
              <div className="grid md:grid-cols-3 gap-8">
                {pillars.map(p => (
                  <div key={p.id} className="glass-panel glass-panel-hover rounded-[32px] p-8 reveal-target">
                    <div className="w-16 h-16 rounded-[20px] flex items-center justify-center glass-panel mb-8">{p.icon}</div>
                    <h3 className="font-syne text-5xl font-bold text-white/20 mb-2">{p.id}</h3>
                    <h4 className="text-2xl font-bold text-white mb-2">{p.title}</h4>
                    <p className="text-white/70">{p.desc}</p>
                  </div>
                ))}
              </div>
            </section>
          );
        };

        const InteractiveToolSection = () => {
          const [inputs, setInputs] = useState({ p: '', d: '', h: '' });
          const [result, setResult] = useState(null);
          const [loading, setLoading] = useState(false);

          const handleAnalyze = () => {
            setLoading(true);
            setTimeout(() => {
              setLoading(false);
              setResult("Tu propósito óptimo se encuentra al fusionar tu pasión con tus talentos innatos. ¡Has encontrado el centro!");
            }, 1500);
          };

          return (
            <section id="analizador" className="py-24 px-6 bg-[#0A1628]/80">
              <div className="max-w-4xl mx-auto glass-panel rounded-[32px] p-8 md:p-12 reveal-target">
                <SectionHeading title="Analiza tu Propósito" />
                <div className="space-y-6">
                  <textarea onChange={e => setInputs({...inputs, p: e.target.value})} placeholder="¿Qué te apasiona?" className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white h-24 focus:border-[#C8F56A]/50 outline-none" />
                  <textarea onChange={e => setInputs({...inputs, d: e.target.value})} placeholder="¿Cuáles son tus dones?" className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white h-24 focus:border-[#C8F56A]/50 outline-none" />
                  <textarea onChange={e => setInputs({...inputs, h: e.target.value})} placeholder="¿Qué habilidades tienes?" className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white h-24 focus:border-[#C8F56A]/50 outline-none" />
                  <button onClick={handleAnalyze} className="w-full py-4 bg-[#C8F56A] text-navy font-bold rounded-xl hover:scale-[1.02] transition-all text-[#0A1628]">
                    {loading ? "Analizando..." : "Revelar mi Propósito"}
                  </button>
                  {result && <div className="p-6 bg-[#C8F56A]/10 border border-[#C8F56A]/30 rounded-xl mt-6 text-center animate-pulse">{result}</div>}
                </div>
              </div>
            </section>
          );
        };

        function App() {
          useEffect(() => {
            const observer = new IntersectionObserver(entries => {
              entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
              });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal-target').forEach(el => observer.observe(el));
          }, []);

          return (
            <div className="mesh-bg min-h-screen">
              <style>{globalStyles}</style>
              <nav className="fixed top-0 w-full z-50 glass-panel px-6 py-4">
                <div className="max-w-7xl mx-auto flex justify-between items-center font-syne font-bold text-2xl">PDH.</div>
              </nav>
              <main>
                <HeroSection />
                <TriangleSection />
                <InteractiveToolSection />
              </main>
              <footer className="py-10 text-center text-white/40 text-sm">© 2026 Método PDH</footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
